name: CI/CD Laravel Docker Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Lấy code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Setup PHP
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    # 3. Cài dependencies
    - name: Install dependencies
      run: composer install --no-interaction --prefer-dist
    
    - name: Setup environment
      run: |
        cp .env.example .env
        php artisan key:generate

    # 4. Run test
    - name: Run test
      run: php artisan test 

    # 5. Build Docker image
    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/webcoffenhom6 .

    # 6. Login Docker Hub
    - name: Login Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 7. Push image
    - name: Push Docker image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/webcoffenhom6

    # 8. Deploy lên EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/webcoffenhom6
          sudo docker stop coffee || true
          sudo docker rm coffee || true
          sudo docker run -d -p 80:8000 --name coffee ${{ secrets.DOCKER_USERNAME }}/webcoffenhom6